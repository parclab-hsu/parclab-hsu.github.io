site_name: Physical AI · 2026-2학기
site_description: 한성대학교 미래모빌리티학과 3학년 · Physical AI 강의 자료
site_url: https://parclab-hsu.github.io/courses/202602/physical-ai/
site_dir: ../../courses/202602/physical-ai
docs_dir: docs
use_directory_urls: true

theme:
  name: material
  language: ko
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 다크 모드로
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 라이트 모드로
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.footer
    - content.code.copy
    - search.highlight
    - toc.follow

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.blocks.caption
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - 강의 개요: index.md
  - 복사용 실습 코드: code-snippets.md
  - 강의 계획 (15주):
    - 1주차 · Isaac Sim 설치·활용: week01.md
    - 2주차 · 물리환경·카메라(RGB/Depth): week02.md
    - 3주차 · 센서(IMU·LiDAR·Radar): week03.md
    - 4주차 · Isaac Lab 4족 보행 RL: week04.md
    - 5주차 · Spot+ATS 시스템 구축: week05.md
    - 6주차 · SLAM·Nav2 기본: week06.md
    - 7주차 · Spot+ATS SLAM 연동 1: week07.md
    - 8주차 · 중간고사: week08.md
    - 9주차 · Spot+ATS SLAM 연동 2: week09.md
    - 10주차 · Spot+ATS Vision(YOLOv8): week10.md
    - 11주차 · System-1 Executor 설계: week11.md
    - 12주차 · System-1 단위 액션 1: week12.md
    - 13주차 · System-1 단위 액션 2: week13.md
    - 14주차 · System-2 LLM Planner: week14.md
    - 15주차 · System-2 테스트·검증: week15.md
  - 🏠 PARC Lab 홈: https://parclab-hsu.github.io/

extra:
  generator: false
